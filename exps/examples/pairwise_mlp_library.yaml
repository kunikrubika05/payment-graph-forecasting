experiment:
  name: pairwise_mlp_library_smoke
  model: pairwise_mlp
  tags: [example, library]

data:
  source: stream_graph
  period: period_10
  data_dir: /tmp/pairmlp_data

sampling:
  strategy: tgb_mixed
  n_random_neg: 50
  n_hist_neg: 50

training:
  epochs: 5
  batch_size: 256
  lr: 0.001
  patience: 5
  seed: 42
  weight_decay: 0.0001
  dropout: 0.0

runtime:
  dry_run: true
  output_dir: /tmp/pairmlp_results

upload:
  enabled: false

model:
  loss: bpr
  precompute_dir: /tmp/pairmlp_precompute
  features: [cn_uu, log1p_cn_uu, aa_uu]
